name: youtube_sync_dart
description: YouTube sync CLI — generates 3 separate files per channel
  (live/videos/shorts) using youtube_explode_dart for accurate metadata-based
  classification. MERGE with existing content + AUTO-ARCHIVE support.
publish_to: none
version: 2.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  youtube_explode_dart: ^2.2.3
  http: ^1.2.0
  xml: ^6.5.0

dev_dependencies:
  lints: ^3.0.0
  test: ^1.24.0
